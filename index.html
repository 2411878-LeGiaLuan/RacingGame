<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ĐẠI CHIẾN HẠM - GIA LUÂN</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; z-index: 10; text-shadow: 2px 2px #000; }
        #overlay, #shop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; text-align: center; }
        #shop { display: none; background: rgba(0,10,20,0.95); }
        .btn { background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; padding: 15px 35px; border-radius: 50px; border: none; font-size: 20px; margin: 10px; box-shadow: 0 0 15px #ff4757; cursor: pointer; }
        .shop-item { background: rgba(255,255,255,0.1); padding: 15px; margin: 10px; border-radius: 15px; width: 280px; border: 1px solid #00d2ff; }
        .shop-item b { color: #ffd700; font-size: 18px; }
        .buy-btn { background: #00d2ff; color: black; border: none; padding: 5px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .stat-val { color: #00ffcc; }
    </style>
</head>
<body>
    <div id="ui">
        <div>TIỀN: <span class="stat-val" id="moneyUI">0</span>$</div>
        <div>ĐIỂM: <span class="stat-val" id="scoreUI">0</span></div>
    </div>

    <div id="overlay">
        <h1 style="font-size: 50px; color: #ff4757; text-shadow: 0 0 20px #ff4757;">ĐẠI CHIẾN HẠM</h1>
        <p>Tiêu diệt địch để ghi điểm và kiếm tiền!</p>
        <button class="btn" onclick="startGame()">KHAI CHIẾN</button>
        <button class="btn" style="background: #00d2ff; box-shadow: 0 0 15px #00d2ff;" onclick="toggleShop(true)">VŨ KHÍ SHOP</button>
    </div>

    <div id="shop">
        <h2 style="color: #00d2ff;">HỆ THỐNG VŨ KHÍ</h2>
        <div id="shopList">
            <div class="shop-item">
                <b>LAZE ĐÔI</b><br><small>Bắn 2 tia song song mạnh mẽ</small><br>
                <span>Giá: 500$</span> <button class="buy-btn" onclick="buyWeapon(1, 500)">MUA</button>
            </div>
            <div class="shop-item">
                <b>SÚNG BA TIA</b><br><small>Tỏa rộng quét sạch màn hình</small><br>
                <span>Giá: 1200$</span> <button class="buy-btn" onclick="buyWeapon(2, 1200)">MUA</button>
            </div>
            <div class="shop-item">
                <b>PHÁO PLASMA</b><br><small>Đạn khổng lồ siêu sát thương</small><br>
                <span>Giá: 2500$</span> <button class="buy-btn" onclick="buyWeapon(3, 2500)">MUA</button>
            </div>
        </div>
        <button class="btn" onclick="toggleShop(false)">QUAY LẠI</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false, score = 0, money = 100, weaponType = 0;
        let player = { x: canvas.width/2, y: canvas.height-120, w: 60, h: 80 };
        let enemies = [], bullets = [], items = [], boss = null;

        // Âm thanh giả lập
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
            o.type = t; o.frequency.value = f; g.gain.value = 0.1;
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function toggleShop(show) {
            document.getElementById("shop").style.display = show ? "flex" : "none";
            document.getElementById("moneyUI").innerText = money;
        }

        function buyWeapon(type, price) {
            if (money >= price) {
                money -= price;
                weaponType = type;
                alert("Đã nâng cấp vũ khí!");
                toggleShop(false);
            } else { alert("Không đủ tiền, hãy nhặt thêm tiền trên đường đua!"); }
        }

        window.addEventListener("touchmove", (e) => {
            if(!gameActive) return;
            player.x = e.touches[0].clientX;
        });

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            gameActive = true;
            document.getElementById("overlay").style.display = "none";
            score = 0; enemies = []; bullets = []; boss = null;
        }

        function spawnEnemy() {
            if (!gameActive) return;
            if (score > 0 && score % 1000 === 0 && !boss) {
                boss = { x: canvas.width/2, y: -150, hp: 50, maxHp: 50, dir: 1 };
            } else if (!boss) {
                enemies.push({ x: Math.random()*(canvas.width-50)+25, y: -50, hp: 1, type: Math.random()>0.8?'tank':'car' });
            }
            if (Math.random() > 0.7) items.push({ x: Math.random()*(canvas.width-50)+25, y: -50 });
            setTimeout(spawnEnemy, 800);
        }

        function fire() {
            if (!gameActive) return;
            if (weaponType === 0) bullets.push({ x: player.x, y: player.y-40, vx: 0, size: 4 });
            if (weaponType === 1) { 
                bullets.push({ x: player.x-15, y: player.y-40, vx: 0, size: 4 });
                bullets.push({ x: player.x+15, y: player.y-40, vx: 0, size: 4 });
            }
            if (weaponType === 2) {
                bullets.push({ x: player.x, y: player.y-40, vx: 0, size: 4 });
                bullets.push({ x: player.x, y: player.y-40, vx: -2, size: 4 });
                bullets.push({ x: player.x, y: player.y-40, vx: 2, size: 4 });
            }
            if (weaponType === 3) bullets.push({ x: player.x, y: player.y-40, vx: 0, size: 15 });
            playSfx(400, 'square', 0.05);
            setTimeout(fire, 300);
        }

        function update() {
            if (!gameActive) return;
            
            bullets.forEach((b, i) => {
                b.y -= 12; b.x += b.vx || 0;
                if(b.y < 0) bullets.splice(i, 1);
            });

            enemies.forEach((e, i) => {
                e.y += 5;
                if(e.y > canvas.height) enemies.splice(i, 1);
                bullets.forEach((b, bi) => {
                    if(Math.abs(b.x-e.x)<25 && Math.abs(b.y-e.y)<40) {
                        enemies.splice(i, 1); bullets.splice(bi, 1);
                        score += 50; money += 5; // Điểm chỉ tăng khi hạ địch
                    }
                });
                if(Math.abs(player.x-e.x)<40 && Math.abs(player.y-e.y)<60) endGame();
            });

            if (boss) {
                boss.y += boss.y < 100 ? 2 : 0;
                boss.x += 3 * boss.dir;
                if (boss.x > canvas.width-50 || boss.x < 50) boss.dir *= -1;
                bullets.forEach((b, bi) => {
                    if (Math.abs(b.x-boss.x)<60 && Math.abs(b.y-boss.y)<60) {
                        boss.hp--; bullets.splice(bi, 1);
                        if(boss.hp <= 0) { boss = null; score += 1000; money += 500; }
                    }
                });
            }

            items.forEach((it, i) => {
                it.y += 5;
                if(Math.abs(player.x-it.x)<40 && Math.abs(player.y-it.y)<60) {
                    money += 50; items.splice(i, 1); playSfx(800, 'sine', 0.1);
                }
            });

            document.getElementById("scoreUI").innerText = score;
            document.getElementById("moneyUI").innerText = money;
        }

        function draw() {
            ctx.fillStyle = "#00050a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Vẽ vạch đường lướt
            ctx.fillStyle = "#0a1a2a";
            for(let i=0; i<10; i++) ctx.fillRect(canvas.width/2-2, (i*150 + Date.now()/10)%canvas.height, 4, 80);

            // Đạn
            ctx.fillStyle = "#00ffcc";
            bullets.forEach(b => ctx.fillRect(b.x-b.size/2, b.y, b.size, 20));

            // Địch
            enemies.forEach(e => {
                ctx.fillStyle = e.type==='tank'?'#57606f':'#ff4757';
                ctx.fillRect(e.x-25, e.y-40, 50, 80);
            });

            // Boss
            if (boss) {
                ctx.fillStyle = "#ff0000"; ctx.fillRect(boss.x-60, boss.y-50, 120, 100);
                ctx.fillStyle = "white"; ctx.fillRect(boss.x-50, boss.y-70, 100, 5);
                ctx.fillStyle = "#00ff00"; ctx.fillRect(boss.x-50, boss.y-70, (boss.hp/boss.maxHp)*100, 5);
                ctx.font = "bold 15px Arial"; ctx.fillText("BOSS DỮ DẰN", boss.x-45, boss.y-80);
            }

            // Vật phẩm tiền
            ctx.font = "25px Arial";
            items.forEach(it => ctx.fillText("💰", it.x-12, it.y));

            // Chiến hạm người chơi
            ctx.shadowBlur = 20; ctx.shadowColor = "#00d2ff";
            ctx.fillStyle = "#00d2ff";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y-50);
            ctx.lineTo(player.x-30, player.y+30);
            ctx.lineTo(player.x+30, player.y+30);
            ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;

            update(); requestAnimationFrame(draw);
        }

        function endGame() {
            gameActive = false;
            document.getElementById("overlay").style.display = "flex";
            document.querySelector("h1").innerText = "CHIẾN HẠM THẤT THỦ";
        }

        spawnEnemy(); fire(); draw();
    </script>
</body>
</html>
