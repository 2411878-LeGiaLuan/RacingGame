<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ĐẠI CHIẾN HẠM - HỆ THỐNG ĐĂNG NHẬP</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        
        /* UI Tổng quát */
        #ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        #moneyUI { color: #ffd700; } #scoreUI { color: #00ffcc; }

        /* Các lớp phủ (Overlays) */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; text-align: center; }
        
        /* Form Đăng Nhập (Sign In) */
        #signinScreen { background: linear-gradient(135deg, #050510, #101030); }
        .input-box { padding: 15px; width: 250px; border-radius: 10px; border: 2px solid #ff4757; background: #000; color: white; font-size: 18px; margin-bottom: 20px; outline: none; text-align: center; }
        
        /* Nút bấm Víp */
        .btn { background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; padding: 15px 45px; border-radius: 50px; border: none; font-size: 20px; cursor: pointer; box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); margin: 10px; }
        .btn-purple { background: linear-gradient(45deg, #9933ff, #bf80ff); box-shadow: 0 0 20px rgba(153, 51, 255, 0.4); }

        /* Trang Profile */
        #profilePage { display: none; background: rgba(5, 5, 15, 0.98); }
        .profile-card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid #00d2ff; width: 300px; }
    </style>
</head>
<body>

    <div id="ui">
        <div>TIỀN: <span id="moneyUI">0</span>$</div>
        <div>ĐIỂM: <span id="scoreUI">0</span></div>
    </div>

    <div id="signinScreen" class="overlay-screen">
        <h1 style="color: #ff4757; font-size: 40px; text-shadow: 0 0 20px #ff4757;">ĐĂNG NHẬP HẠM</h1>
        <p>Nhập tên Thuyền trưởng để bắt đầu:</p>
        <input type="text" id="userNameInput" class="input-box" placeholder="Tên của bạn..." maxlength="12">
        <button class="btn" onclick="processSignIn()">XÁC NHẬN</button>
    </div>

    <div id="mainMenu" class="overlay-screen" style="display: none;">
        <h1 style="font-size: 45px; color: #ff4757;">ĐẠI CHIẾN HẠM</h1>
        <p id="welcomeMsg" style="color: #00ffcc; font-weight: bold;"></p>
        <button class="btn" onclick="startGame()">KHAI CHIẾN</button>
        <button class="btn btn-purple" onclick="toggleProfile(true)">HỒ SƠ TÀI KHOẢN</button>
    </div>

    <div id="profilePage" class="overlay-screen">
        <h2>THÔNG TIN THUYỀN TRƯỞNG</h2>
        <div class="profile-card">
            <p>TÊN: <span id="pName" style="color: #ff4757; font-weight: bold;">---</span></p>
            <p>TỔNG TIỀN NHẶT ĐƯỢC:</p>
            <h1 id="pTotalMoney" style="color: #ffd700;">0$</h1>
            <p>CẤP BẬC: <span id="pRank" style="color: #00ffcc; font-style: italic;">---</span></p>
        </div>
        <button class="btn" onclick="toggleProfile(false)">QUAY LẠI</button>
        <button class="btn btn-purple" style="font-size: 14px; padding: 10px 20px;" onclick="resetAccount()">ĐỔI TÀI KHOẢN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // --- HỆ THỐNG DỮ LIỆU ---
        let userData = { name: "", totalMoney: 0 };
        let gameActive = false, score = 0, currentMoney = 0;
        let player = { x: canvas.width/2, y: canvas.height-120 };
        let enemies = [], bullets = [], items = [], boss = null;
        let spawnTime, fireTime;

        function initData() {
            let saved = localStorage.getItem("daichienham_v4");
            if (saved) {
                userData = JSON.parse(saved);
                showMainMenu();
            } else {
                document.getElementById("signinScreen").style.display = "flex";
            }
        }

        function processSignIn() {
            let name = document.getElementById("userNameInput").value.trim();
            if (name.length >= 2) {
                userData.name = name.toUpperCase();
                localStorage.setItem("daichienham_v4", JSON.stringify(userData));
                showMainMenu();
            } else { alert("Vui lòng nhập tên từ 2 ký tự trở lên!"); }
        }

        function showMainMenu() {
            document.getElementById("signinScreen").style.display = "none";
            document.getElementById("mainMenu").style.display = "flex";
            document.getElementById("welcomeMsg").innerText = "CHÀO MỪNG THUYỀN TRƯỞNG: " + userData.name;
        }

        function toggleProfile(show) {
            document.getElementById("profilePage").style.display = show ? "flex" : "none";
            if (show) {
                document.getElementById("pName").innerText = userData.name;
                document.getElementById("pTotalMoney").innerText = userData.totalMoney + "$";
                let rank = "LÍNH MỚI";
                if(userData.totalMoney > 2000) rank = "ĐÔ ĐỐC";
                if(userData.totalMoney > 10000) rank = "HUYỀN THOẠI";
                document.getElementById("pRank").innerText = rank;
            }
        }

        function resetAccount() {
            if(confirm("Bạn muốn xóa tài khoản và đổi tên mới?")) {
                localStorage.removeItem("daichienham_v4");
                location.reload();
            }
        }

        // --- LOGIC GAME (Sửa lỗi Súng và Địch) ---
        function startGame() {
            gameActive = true;
            document.getElementById("mainMenu").style.display = "none";
            score = 0; currentMoney = 0; enemies = []; bullets = []; boss = null;
            spawnLogic(); fireLogic();
        }

        function spawnLogic() {
            if (!gameActive) return;
            // Tạo Boss mỗi 1500 điểm
            if (score > 0 && score % 1500 === 0 && !boss) {
                boss = { x: canvas.width/2, y: -100, hp: 60, maxHp: 60, dir: 1 };
            } else if (!boss) {
                enemies.push({ x: Math.random()*(canvas.width-60)+30, y: -50, type: Math.random()>0.8?'tank':'car' });
            }
            if (Math.random() > 0.7) items.push({ x: Math.random()*(canvas.width-60)+30, y: -50 });
            setTimeout(spawnLogic, Math.max(300, 900 - score/15));
        }

        function fireLogic() {
            if (!gameActive) return;
            bullets.push({ x: player.x, y: player.y-40 });
            setTimeout(fireLogic, 250);
        }

        window.addEventListener("touchmove", (e) => { if(gameActive) player.x = e.touches[0].clientX; });

        function update() {
            if (!gameActive) return;
            bullets.forEach((b, i) => { b.y -= 12; if(b.y < 0) bullets.splice(i,1); });
            enemies.forEach((e, i) => {
                e.y += 6;
                bullets.forEach((b, bi) => {
                    if (Math.abs(b.x-e.x)<30 && Math.abs(b.y-e.y)<40) {
                        enemies.splice(i,1); bullets.splice(bi,1);
                        score += 50; currentMoney += 10;
                    }
                });
                if (Math.abs(player.x-e.x)<40 && Math.abs(player.y-e.y)<60) endGame();
            });
            if (boss) {
                boss.y += boss.y < 100 ? 2 : 0; boss.x += 4 * boss.dir;
                if (boss.x > canvas.width-50 || boss.x < 50) boss.dir *= -1;
                bullets.forEach((b, bi) => {
                    if (Math.abs(b.x-boss.x)<70 && Math.abs(b.y-boss.y)<70) {
                        boss.hp--; bullets.splice(bi, 1);
                        if(boss.hp <= 0) { boss = null; score += 2000; currentMoney += 500; }
                    }
                });
            }
            items.forEach((it, i) => { it.y += 6; if(Math.abs(player.x-it.x)<40 && Math.abs(player.y-it.y)<60) { currentMoney += 50; items.splice(i,1); } });
            
            document.getElementById("scoreUI").innerText = score;
            document.getElementById("moneyUI").innerText = currentMoney;
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width, canvas.height);
            // Vạch đường
            ctx.fillStyle = "#111";
            for(let i=0; i<10; i++) ctx.fillRect(canvas.width/2-2, (i*140 + Date.now()/10)%canvas.height, 4, 80);
            // Đạn & Địch
            ctx.fillStyle = "#00ffcc"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 20));
            enemies.forEach(e => { ctx.fillStyle = e.type==='tank'?'#555':'#f44'; ctx.fillRect(e.x-25, e.y-40, 50, 80); });
            if(boss) { 
                ctx.fillStyle = "red"; ctx.fillRect(boss.x-60, boss.y-50, 120, 100); 
                ctx.fillStyle = "#0f0"; ctx.fillRect(boss.x-50, boss.y-70, (boss.hp/boss.maxHp)*100, 5);
            }
            ctx.font = "25px Arial"; items.forEach(it => ctx.fillText("💰", it.x-15, it.y));
            // Chiến hạm (Người chơi)
            ctx.shadowBlur = 15; ctx.shadowColor = "#00d2ff"; ctx.fillStyle = "#00d2ff";
            ctx.beginPath(); ctx.moveTo(player.x, player.y-50); ctx.lineTo(player.x-30, player.y+30); ctx.lineTo(player.x+30, player.y+30); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;
            update(); requestAnimationFrame(draw);
        }

        function endGame() {
            gameActive = false;
            userData.totalMoney += currentMoney;
            localStorage.setItem("daichienham_v4", JSON.stringify(userData));
            document.getElementById("mainMenu").style.display = "flex";
            document.querySelector("h1").innerText = "KẾT THÚC CHIẾN DỊCH";
        }

        initData(); draw();
    </script>
</body>
</html>
