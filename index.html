<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Luân: Đua Xe Siêu Cấp</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 10; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: white; }
        .btn { background: #00d2ff; color: black; padding: 15px 40px; border-radius: 30px; font-weight: bold; border: none; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="ui">ĐIỂM: <span id="score">0</span></div>
    <div id="overlay">
        <h1 style="color: #00d2ff;">SIÊU TỐC GIA LUÂN</h1>
        <p>Vuốt qua lại để né xe đỏ!</p>
        <button class="btn" onclick="startGame()">BẮT ĐẦU</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const overlay = document.getElementById("overlay");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false, score = 0, speed = 7;
        let player = { x: canvas.width / 2, y: canvas.height - 150, w: 50, h: 80 };
        let enemies = [];

        // Điều khiển Vuốt (Swipe) mượt mà cho iPhone
        window.addEventListener("touchmove", (e) => {
            if (!gameActive) return;
            let touchX = e.touches[0].clientX;
            player.x = touchX;
            // Giữ xe trong màn hình
            if (player.x < 25) player.x = 25;
            if (player.x > canvas.width - 25) player.x = canvas.width - 25;
        });

        function startGame() {
            gameActive = true;
            overlay.style.display = "none";
            score = 0; speed = 7; enemies = [];
        }

        function update() {
            if (!gameActive) return;
            score++;
            scoreEl.innerText = Math.floor(score / 10);
            if (score % 500 === 0) speed += 1;

            // Tạo xe địch
            if (Math.random() < 0.03) {
                enemies.push({ x: Math.random() * (canvas.width - 40) + 20, y: -100, w: 45, h: 70 });
            }

            enemies.forEach((e, i) => {
                e.y += speed;
                if (e.y > canvas.height) enemies.splice(i, 1);

                // Kiểm tra va chạm đơn giản nhưng cực chuẩn
                if (player.x - 25 < e.x + 22 && player.x + 25 > e.x - 22 &&
                    player.y < e.y + 70 && player.y + 80 > e.y) {
                    gameActive = false;
                    overlay.style.display = "flex";
                    document.querySelector("h1").innerText = "THUA RỒI!";
                }
            });
        }

        function draw() {
            ctx.fillStyle = "#111"; // Nền đường
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vẽ vạch kẻ đường
            ctx.fillStyle = "white";
            for (let i = 0; i < 10; i++) {
                ctx.fillRect(canvas.width / 2 - 2, (i * 100 + (score * 2) % 100), 4, 50);
            }

            // Vẽ Xe Gia Luân (Màu xanh Neon)
            ctx.shadowBlur = 15; ctx.shadowColor = "#00d2ff";
            ctx.fillStyle = "#00d2ff";
            ctx.fillRect(player.x - 25, player.y, 50, 80);
            // Thêm kính xe cho chuyên nghiệp
            ctx.fillStyle = "white";
            ctx.fillRect(player.x - 15, player.y + 10, 30, 15);

            // Vẽ Xe địch (Màu đỏ)
            ctx.shadowColor = "red";
            ctx.fillStyle = "red";
            enemies.forEach(e => {
                ctx.fillRect(e.x - 22, e.y, 45, 70);
            });

            ctx.shadowBlur = 0;
            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
