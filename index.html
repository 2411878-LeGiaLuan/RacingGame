<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ĐẠI CHIẾN HẠM - GIA LUÂN PRODUCTION</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,5,15,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; text-align: center; }
        .input-box { padding: 15px; width: 250px; border-radius: 10px; border: 2px solid #00d2ff; background: #000; color: white; font-size: 18px; margin-bottom: 20px; text-align: center; outline: none; }
        .btn { background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; padding: 12px 35px; border-radius: 50px; border: none; font-size: 18px; cursor: pointer; margin: 8px; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .btn-blue { background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .shop-item { background: rgba(255,255,255,0.05); padding: 12px; margin: 8px; border-radius: 15px; width: 280px; border: 1px solid #00d2ff; }
        .buy-btn { background: #ffd700; color: #000; border: none; padding: 5px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui">
        <div>TIỀN: <span id="moneyUI" style="color: #ffd700;">0</span>$</div>
        <div>ĐIỂM: <span id="scoreUI" style="color: #00ffcc;">0</span></div>
    </div>

    <div id="signinScreen" class="overlay-screen">
        <h1 style="color: #00d2ff; font-size: 35px; text-shadow: 0 0 20px #00d2ff;">ĐĂNG NHẬP HẠM</h1>
        <input type="text" id="userNameInput" class="input-box" placeholder="Tên Thuyền trưởng..." maxlength="12">
        <button class="btn btn-blue" onclick="processSignIn()">TIẾP NHẬN HẠM</button>
    </div>

    <div id="mainMenu" class="overlay-screen" style="display: none;">
        <h1 style="font-size: 45px; color: #ff4757; text-shadow: 0 0 20px #ff4757;">ĐẠI CHIẾN HẠM</h1>
        <p id="welcomeMsg" style="color: #ffd700; font-weight: bold;"></p>
        <button class="btn" onclick="startGame()">KHAI CHIẾN</button>
        <button class="btn btn-blue" onclick="toggleShop(true)">VŨ KHÍ SHOP</button>
        <button class="btn" style="background: #9933ff;" onclick="toggleProfile(true)">HỒ SƠ</button>
    </div>

    <div id="shopPage" class="overlay-screen" style="display: none;">
        <h2 style="color: #ffd700;">WEAPON CENTER</h2>
        <div class="shop-item"><b>LAZE ĐÔI</b><br><small>2 tia song song</small><br>Giá: 500$ <button class="buy-btn" onclick="buyWeapon(1, 500)">MUA</button></div>
        <div class="shop-item"><b>SÚNG BA TIA</b><br><small>Tỏa rộng quét địch</small><br>Giá: 1500$ <button class="buy-btn" onclick="buyWeapon(2, 1500)">MUA</button></div>
        <div class="shop-item"><b>PHÁO PLASMA</b><br><small>Đạn cực đại</small><br>Giá: 3000$ <button class="buy-btn" onclick="buyWeapon(3, 3000)">MUA</button></div>
        <button class="btn" onclick="toggleShop(false)">QUAY LẠI</button>
    </div>

    <div id="profilePage" class="overlay-screen" style="display: none;">
        <h2 style="color: #9933ff;">HỒ SƠ THUYỀN TRƯỞNG</h2>
        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; width: 280px; border: 1px solid #9933ff;">
            <p>Tên: <span id="pName" style="color: #00ffcc;">---</span></p>
            <p>Tổng tiền: <span id="pTotal" style="color: #ffd700;">0$</span></p>
            <p>Vũ khí hiện tại: <span id="pGun" style="color: #ff4757;">CƠ BẢN</span></p>
        </div>
        <button class="btn" onclick="toggleProfile(false)">QUAY LẠI</button>
        <button class="btn" style="font-size: 12px; background: #333;" onclick="resetData()">XÓA DỮ LIỆU</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let user = { name: "", money: 0, weapon: 0 };
        let gameActive = false, score = 0, enemies = [], bullets = [], items = [], boss = null;
        let player = { x: canvas.width/2, y: canvas.height-120 };
        let spawnClock, fireClock;

        // --- KHỞI TẠO DỮ LIỆU ---
        function init() {
            let saved = localStorage.getItem("daichienham_v5");
            if (saved) { user = JSON.parse(saved); showMenu(); }
            else { document.getElementById("signinScreen").style.display = "flex"; }
        }

        function processSignIn() {
            let n = document.getElementById("userNameInput").value.trim();
            if (n.length >= 2) { user.name = n.toUpperCase(); save(); showMenu(); }
            else alert("Nhập tên từ 2 ký tự!");
        }

        function save() { localStorage.setItem("daichienham_v5", JSON.stringify(user)); }

        function showMenu() {
            document.querySelectorAll(".overlay-screen").forEach(s => s.style.display="none");
            document.getElementById("mainMenu").style.display = "flex";
            document.getElementById("welcomeMsg").innerText = "THUYỀN TRƯỞNG: " + user.name;
            document.getElementById("moneyUI").innerText = user.money;
        }

        function toggleShop(s) { document.getElementById("shopPage").style.display = s?"flex":"none"; }
        function toggleProfile(s) {
            document.getElementById("profilePage").style.display = s?"flex":"none";
            if(s) {
                document.getElementById("pName").innerText = user.name;
                document.getElementById("pTotal").innerText = user.money + "$";
                let guns = ["CƠ BẢN", "LAZE ĐÔI", "SÚNG BA TIA", "PHÁO PLASMA"];
                document.getElementById("pGun").innerText = guns[user.weapon];
            }
        }

        function buyWeapon(id, price) {
            if (user.money >= price) { user.money -= price; user.weapon = id; save(); alert("Nâng cấp thành công!"); showMenu(); }
            else alert("Không đủ tiền! Hãy nhặt thêm 💰");
        }

        function resetData() { if(confirm("Xóa tài khoản?")) { localStorage.clear(); location.reload(); } }

        // --- GAME LOGIC ---
        function startGame() {
            gameActive = true;
            document.getElementById("mainMenu").style.display = "none";
            score = 0; enemies = []; bullets = []; items = []; boss = null;
            spawnLoop(); fireLoop();
        }

        function spawnLoop() {
            if(!gameActive) return;
            if(score > 0 && score % 1000 === 0 && !boss) {
                boss = { x: canvas.width/2, y: -100, hp: 50, max: 50, dir: 1 };
            } else if(!boss) {
                enemies.push({ x: Math.random()*(canvas.width-60)+30, y: -50, type: Math.random()>0.8?'tank':'car' });
            }
            if(Math.random()>0.7) items.push({ x: Math.random()*(canvas.width-60)+30, y: -50 });
            spawnClock = setTimeout(spawnLoop, Math.max(300, 800 - score/20));
        }

        function fireLoop() {
            if(!gameActive) return;
            let w = user.weapon;
            if(w === 0) bullets.push({ x: player.x, y: player.y-40, vx: 0, s: 4 });
            if(w === 1) { bullets.push({ x: player.x-15, y: player.y-40, vx: 0, s: 4 }); bullets.push({ x: player.x+15, y: player.y-40, vx: 0, s: 4 }); }
            if(w === 2) { bullets.push({ x: player.x, y: player.y-40, vx: 0, s: 4 }); bullets.push({ x: player.x, y: player.y-40, vx: -2, s: 4 }); bullets.push({ x: player.x, y: player.y-40, vx: 2, s: 4 }); }
            if(w === 3) bullets.push({ x: player.x, y: player.y-40, vx: 0, s: 18 });
            fireClock = setTimeout(fireLoop, 250);
        }

        window.addEventListener("touchmove", (e) => { if(gameActive) player.x = e.touches[0].clientX; });

        function update() {
            if(!gameActive) return;
            bullets.forEach((b, i) => { b.y -= 12; b.x += b.vx; if(b.y < 0) bullets.splice(i,1); });
            enemies.forEach((e, i) => {
                e.y += 6;
                bullets.forEach((b, bi) => {
                    if(Math.abs(b.x-e.x)<30 && Math.abs(b.y-e.y)<40) {
                        enemies.splice(i,1); bullets.splice(bi,1);
                        score += 50; user.money += 10;
                    }
                });
                if(Math.abs(player.x-e.x)<40 && Math.abs(player.y-e.y)<60) endGame();
            });
            if(boss) {
                boss.y += boss.y < 100 ? 2 : 0; boss.x += 4 * boss.dir;
                if(boss.x > canvas.width-50 || boss.x < 50) boss.dir *= -1;
                bullets.forEach((b, bi) => {
                    if(Math.abs(b.x-boss.x)<65 && Math.abs(b.y-boss.y)<70) {
                        boss.hp--; bullets.splice(bi,1);
                        if(boss.hp <= 0) { boss = null; score += 1000; user.money += 500; }
                    }
                });
            }
            items.forEach((it, i) => { it.y += 6; if(Math.abs(player.x-it.x)<40 && Math.abs(player.y-it.y)<60) { user.money += 50; items.splice(i,1); } });
            document.getElementById("scoreUI").innerText = score;
            document.getElementById("moneyUI").innerText = user.money;
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0a0a0a"; for(let i=0; i<10; i++) ctx.fillRect(canvas.width/2-2, (i*140 + Date.now()/10)%canvas.height, 4, 80);
            ctx.fillStyle = "#00ffcc"; bullets.forEach(b => ctx.fillRect(b.x-b.s/2, b.y, b.s, 20));
            enemies.forEach(e => { ctx.fillStyle = e.type==='tank'?'#444':'#f44'; ctx.fillRect(e.x-25, e.y-40, 50, 80); });
            if(boss) {
                ctx.fillStyle = "red"; ctx.fillRect(boss.x-60, boss.y-50, 120, 100);
                ctx.fillStyle = "#0f0"; ctx.fillRect(boss.x-50, boss.y-70, (boss.hp/boss.max)*100, 5);
            }
            ctx.font = "25px Arial"; items.forEach(it => ctx.fillText("💰", it.x-15, it.y));
            ctx.shadowBlur = 15; ctx.shadowColor = "#00d2ff"; ctx.fillStyle = "#00d2ff";
            ctx.beginPath(); ctx.moveTo(player.x, player.y-50); ctx.lineTo(player.x-30, player.y+30); ctx.lineTo(player.x+30, player.y+30); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;
            update(); requestAnimationFrame(draw);
        }

        function endGame() {
            gameActive = false; save();
            document.getElementById("mainMenu").style.display = "flex";
            document.querySelector("h1").innerText = "HẠM ĐỘI THẤT THỦ";
        }

        init(); draw();
    </script>
</body>
</html>
