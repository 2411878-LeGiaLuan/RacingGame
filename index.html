<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Luân: Siêu Tốc Chiến Hạm</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; color: #fff; font-size: 20px; font-weight: bold; pointer-events: none; z-index: 10; text-shadow: 2px 2px #000; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: white; text-align: center; }
        .btn { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; padding: 20px 50px; border-radius: 50px; font-weight: bold; border: none; font-size: 24px; margin-top: 20px; box-shadow: 0 0 20px #00d2ff; cursor: pointer; }
        .stat { color: #ffd700; }
    </style>
</head>
<body>
    <div id="ui">
        <div>TIỀN: <span class="stat" id="money">0</span>$</div>
        <div>ĐIỂM: <span id="score">0</span></div>
    </div>
    <div id="overlay">
        <h1 id="title" style="font-size: 40px; color: #00d2ff; margin: 10px;">SIÊU TỐC GIA LUÂN V3</h1>
        <p style="padding: 0 20px;">Vuốt để lái xe - Súng tự động bắn!<br>Ăn TIỀN và QUÀ để nâng cấp</p>
        <button class="btn" onclick="startGame()">KHAI CHIẾN</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const moneyEl = document.getElementById("money");
        const overlay = document.getElementById("overlay");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false, score = 0, money = 0, speed = 8;
        let player = { x: canvas.width / 2, y: canvas.height - 150, w: 50, h: 80, shield: 0 };
        let enemies = [], bullets = [], items = [], particles = [];

        // --- ÂM THANH (Dùng Web Audio API để không cần file ngoài) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // Điều khiển Vuốt (Dính tay 100%)
        window.addEventListener("touchmove", (e) => {
            if (!gameActive) return;
            player.x = e.touches[0].clientX;
            if (player.x < 30) player.x = 30;
            if (player.x > canvas.width - 30) player.x = canvas.width - 30;
        });

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            gameActive = true; overlay.style.display = "none";
            score = 0; money = 0; speed = 8; enemies = []; bullets = []; items = []; particles = [];
            player.shield = 0;
            spawnLoop();
        }

        function spawnLoop() {
            if (!gameActive) return;
            // Tạo xe địch đa dạng
            let type = Math.random() > 0.8 ? 'tank' : 'car';
            enemies.push({ x: Math.random() * (canvas.width - 50) + 25, y: -100, type: type, hp: type === 'tank' ? 3 : 1 });
            
            // Tạo Tiền hoặc Quà
            if (Math.random() > 0.5) {
                items.push({ x: Math.random() * (canvas.width - 50) + 25, y: -100, kind: Math.random() > 0.8 ? 'gift' : 'coin' });
            }
            setTimeout(spawnLoop, Math.max(400, 1000 - score/10));
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color });
            }
        }

        function update() {
            if (!gameActive) return;
            score++; speed += 0.001;
            scoreEl.innerText = Math.floor(score/10);
            moneyEl.innerText = money;

            // Tự động bắn súng
            if (score % 15 === 0) {
                bullets.push({ x: player.x, y: player.y - 40 });
                playSound(440, 'square', 0.05);
            }

            // Cập nhật đạn
            bullets.forEach((b, i) => {
                b.y -= 15;
                if (b.y < 0) bullets.splice(i, 1);
            });

            // Cập nhật xe địch
            enemies.forEach((e, i) => {
                e.y += (e.type === 'car' ? speed : speed * 0.7);
                if (e.y > canvas.height) enemies.splice(i, 1);

                // Va chạm đạn với địch
                bullets.forEach((b, bi) => {
                    if (Math.abs(b.x - e.x) < 30 && Math.abs(b.y - e.y) < 40) {
                        e.hp--;
                        bullets.splice(bi, 1);
                        if (e.hp <= 0) {
                            createExplosion(e.x, e.y, e.type === 'car' ? 'red' : 'gray');
                            enemies.splice(i, 1);
                            money += 5;
                            playSound(150, 'sawtooth', 0.1);
                        }
                    }
                });

                // Va chạm xe với địch
                if (Math.abs(player.x - e.x) < 40 && Math.abs(player.y - e.y) < 60) {
                    if (player.shield > 0) {
                        player.shield = 0;
                        enemies.splice(i, 1);
                        createExplosion(e.x, e.y, 'yellow');
                    } else {
                        endGame();
                    }
                }
            });

            // Cập nhật Tiền/Quà
            items.forEach((it, i) => {
                it.y += speed;
                if (Math.abs(player.x - it.x) < 40 && Math.abs(player.y - it.y) < 60) {
                    if (it.kind === 'coin') money += 20;
                    else player.shield = 300; // Khiên trong 5 giây
                    items.splice(i, 1);
                    playSound(880, 'sine', 0.1);
                }
            });

            if (player.shield > 0) player.shield--;
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life <= 0) particles.splice(i,1); });
        }

        function draw() {
            ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Vẽ vạch đường lướt nhanh
            ctx.fillStyle = "#333";
            for (let i = 0; i < 10; i++) ctx.fillRect(canvas.width/2-2, (i*120 + score*speed/2)%canvas.height, 4, 60);

            // Vẽ Đạn Laze
            ctx.fillStyle = "#00ffcc";
            bullets.forEach(b => ctx.fillRect(b.x - 2, b.y, 4, 20));

            // Vẽ Xe Địch (Đa dạng)
            enemies.forEach(e => {
                ctx.fillStyle = e.type === 'car' ? "#ff4757" : "#57606f";
                ctx.fillRect(e.x - 25, e.y - 40, 50, 80);
                if (e.type === 'tank') { // Vẽ nòng pháo cho tank
                    ctx.fillStyle = "#2f3542"; ctx.fillRect(e.x-5, e.y+20, 10, 30);
                }
            });

            // Vẽ Tiền & Quà
            items.forEach(it => {
                ctx.font = "30px Arial";
                ctx.fillText(it.kind === 'coin' ? "💰" : "🎁", it.x - 15, it.y);
            });

            // Vẽ Xe Người Chơi (GIA LUÂN)
            ctx.shadowBlur = player.shield > 0 ? 30 : 15;
            ctx.shadowColor = player.shield > 0 ? "#ffd700" : "#00d2ff";
            ctx.fillStyle = "#00d2ff";
            ctx.fillRect(player.x - 25, player.y - 40, 50, 80);
            ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText("G.LUÂN", player.x-20, player.y+10);
            ctx.shadowBlur = 0;

            // Vẽ hiệu ứng nổ
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
            ctx.globalAlpha = 1;

            update();
            requestAnimationFrame(draw);
        }

        function endGame() {
            gameActive = false;
            overlay.style.display = "flex";
            document.getElementById("title").innerText = "CHIẾN HẠM BỊ PHÁ HỦY!";
            playSound(100, 'sawtooth', 0.5);
            if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
        }

        draw();
    </script>
</body>
</html>
