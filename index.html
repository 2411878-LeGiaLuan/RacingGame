<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Luân: Siêu Tốc Đua Xe Neon</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #fff; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #00d2ff; pointer-events: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: white; }
        .btn { background: #00d2ff; color: #000; padding: 15px 40px; border-radius: 30px; font-weight: bold; border: none; font-size: 20px; margin-top: 20px; box-shadow: 0 0 20px #00d2ff; }
    </style>
</head>
<body>
    <div id="ui">QUÃNG ĐƯỜNG: <span id="dist">0</span>m</div>
    <div id="overlay">
        <h1 id="title" style="font-size: 40px; color: #00d2ff;">SIÊU TỐC NEON</h1>
        <p id="msg">Né các xe đỏ và thu thập tia sét Nitro!</p>
        <button class="btn" onclick="startGame()">BẮT ĐẦU ĐUA</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const distEl = document.getElementById("dist");
        const overlay = document.getElementById("overlay");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let distance = 0;
        let speed = 8;
        let laneWidth = canvas.width / 3;
        let playerLane = 1; // 0: Trái, 1: Giữa, 2: Phải
        let targetX = laneWidth * playerLane + laneWidth / 2;
        let playerX = targetX;
        let enemies = [];
        let items = [];
        let nitroMode = 0; // Thời gian hiệu ứng Nitro

        // Điều khiển cảm ứng/chuột
        window.addEventListener("touchstart", (e) => {
            let touchX = e.touches[0].clientX;
            if (touchX < canvas.width / 2) {
                if (playerLane > 0) playerLane--;
            } else {
                if (playerLane < 2) playerLane++;
            }
            targetX = laneWidth * playerLane + laneWidth / 2;
        });

        function startGame() {
            gameActive = true;
            overlay.style.display = "none";
            distance = 0;
            speed = 8;
            enemies = [];
            items = [];
            nitroMode = 0;
        }

        function createEnemy() {
            if (Math.random() < 0.03) {
                enemies.push({ lane: Math.floor(Math.random() * 3), y: -100 });
            }
        }

        function createItem() {
            if (Math.random() < 0.01) {
                items.push({ lane: Math.floor(Math.random() * 3), y: -100 });
            }
        }

        function update() {
            if (!gameActive) return;

            distance += Math.floor(speed / 2);
            distEl.innerText = distance;
            speed += 0.002; // Tăng dần tốc độ

            // Di chuyển mượt mà giữa các làn
            playerX += (targetX - playerX) * 0.2;

            // Xử lý kẻ địch
            enemies.forEach((e, i) => {
                e.y += speed;
                if (e.y > canvas.height) enemies.splice(i, 1);

                // Va chạm
                let ex = e.lane * laneWidth + laneWidth / 2;
                let dx = Math.abs(playerX - ex);
                let dy = Math.abs((canvas.height - 120) - e.y);
                if (dx < 40 && dy < 70) {
                    if (nitroMode > 0) {
                        enemies.splice(i, 1); // Đang nitro thì húc bay xe địch
                    } else {
                        gameActive = false;
                        overlay.style.display = "flex";
                        document.getElementById("title").innerText = "GAME OVER";
                        document.getElementById("msg").innerText = "Kỷ lục của bạn: " + distance + "m";
                    }
                }
            });

            // Xử lý vật phẩm Nitro
            items.forEach((it, i) => {
                it.y += speed;
                let ix = it.lane * laneWidth + laneWidth / 2;
                if (Math.abs(playerX - ix) < 40 && Math.abs((canvas.height - 120) - it.y) < 50) {
                    nitroMode = 200;
                    items.splice(i, 1);
                }
            });
            if (nitroMode > 0) nitroMode--;

            createEnemy();
            createItem();
        }

        function draw() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vẽ làn đường Neon
            ctx.strokeStyle = "#333";
            ctx.setLineDash([40, 20]);
            ctx.lineDashOffset = -distance;
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // Vẽ xe người chơi (Gia Luân)
            let pColor = nitroMode > 0 ? "#ff00ff" : "#00d2ff";
            ctx.shadowBlur = 20; ctx.shadowColor = pColor;
            ctx.fillStyle = pColor;
            ctx.fillRect(playerX - 25, canvas.height - 150, 50, 90);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 12px Arial";
            ctx.fillText("LUÂN", playerX - 17, canvas.height - 100);

            // Vẽ xe địch
            ctx.shadowColor = "#ff4757";
            ctx.fillStyle = "#ff4757";
            enemies.forEach(e => {
                let ex = e.lane * laneWidth + laneWidth / 2;
                ctx.fillRect(ex - 25, e.y, 50, 80);
            });

            // Vẽ vật phẩm Nitro
            ctx.shadowColor = "#ffff00";
            ctx.fillStyle = "#ffff00";
            items.forEach(it => {
                let ix = it.lane * laneWidth + laneWidth / 2;
                ctx.beginPath();
                ctx.arc(ix, it.y, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#000";
                ctx.fillText("⚡", ix - 7, it.y + 5);
            });
            ctx.shadowBlur = 0;

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
